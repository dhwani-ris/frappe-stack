name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
      - "README.md"
      - "PRD.md"
      - "PLAN.md"
      - "SECURITY.md"
      - "CLAUDE.md"
      - "HEARTBEAT.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Stage Builder Protocol files into docs/
        run: |
          for f in PRD.md PLAN.md SECURITY.md CLAUDE.md HEARTBEAT.md CHANGELOG.md CONTRIBUTING.md; do
            if [ -f "$f" ]; then
              cp "$f" "docs/$f"
            fi
          done

      - name: Build site
        run: mkdocs build --verbose

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
